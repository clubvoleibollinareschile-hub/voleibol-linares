<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🏐 Voleibol Linares</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--azul:#1a365d;--med:#2B6CB0;--claro:#EBF4FF;--rojo:#E53E3E;--verde:#276749;--gris:#4A5568;--borde:#CBD5E0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:linear-gradient(160deg,#0f2447,#1a365d 40%,#2B6CB0);min-height:100vh;padding:16px 12px 48px;}
.hdr{text-align:center;color:white;margin-bottom:20px;}
.hdr .ico{font-size:2.5rem;display:block;margin-bottom:6px;}
.hdr h1{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:clamp(1.3rem,5vw,2rem);letter-spacing:1.5px;text-transform:uppercase;line-height:1.1;}
.hdr p{font-size:0.82rem;opacity:0.72;margin-top:5px;}
.card{background:white;border-radius:18px;box-shadow:0 8px 40px rgba(0,0,0,0.25);max-width:660px;margin:0 auto;overflow:hidden;}
.srch{background:linear-gradient(135deg,#1a365d,#2B6CB0);padding:22px 20px;}
.srch label{display:block;color:rgba(255,255,255,0.82);font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;}
.srow{display:flex;gap:8px;}
#ri{flex:1;padding:13px 15px;border-radius:10px;border:2px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.14);color:white;font-family:'Barlow Condensed',sans-serif;font-size:1.15rem;font-weight:700;letter-spacing:2px;outline:none;transition:all .2s;}
#ri::placeholder{color:rgba(255,255,255,0.38);}
#ri:focus{border-color:rgba(255,255,255,0.65);background:rgba(255,255,255,0.2);}
#bb{padding:13px 20px;background:#E53E3E;color:white;border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:0.92rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:all .18s;box-shadow:0 3px 10px rgba(229,62,62,0.35);}
#bb:hover{background:#C53030;}
#bb:disabled{background:#718096;cursor:not-allowed;box-shadow:none;}
.hint{margin-top:7px;color:rgba(255,255,255,0.5);font-size:0.7rem;}
#sb{padding:10px 20px;font-size:0.82rem;font-weight:600;display:none;align-items:center;gap:8px;}
#sb.ok{background:#C6F6D5;color:#22543D;display:flex;}
#sb.new{background:#FEF3C7;color:#744210;display:flex;}
#sb.err{background:#FED7D7;color:#742A2A;display:flex;}
#sb.load{background:var(--claro);color:var(--azul);display:flex;}
#pw{margin:10px 20px 0;display:none;}
#pw.v{display:block;}
.pl{font-size:0.68rem;color:var(--gris);font-weight:600;margin-bottom:4px;display:flex;justify-content:space-between;}
.pb{height:5px;background:#E2E8F0;border-radius:3px;overflow:hidden;}
#pf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--med),#48BB78);transition:width .4s;}
#fb{padding:18px 20px 4px;display:none;}
#fb.v{display:block;}
.sec{font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1.8px;color:var(--med);border-bottom:2px solid var(--claro);padding-bottom:4px;margin:16px 0 10px;}
.sec:first-child{margin-top:0;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.fg.g3{grid-template-columns:1fr 1fr 1fr;}
.fg.g1{grid-template-columns:1fr;}
@media(max-width:460px){.fg,.fg.g3{grid-template-columns:1fr;}}
.fi{display:flex;flex-direction:column;gap:3px;}
.fi label{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:var(--gris);}
.fi label .r{color:var(--rojo);}
.fi input,.fi select,.fi textarea{padding:9px 11px;border:1.5px solid var(--borde);border-radius:7px;font-family:'Barlow',sans-serif;font-size:0.88rem;color:#2D3748;background:white;outline:none;transition:all .18s;-webkit-appearance:none;}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--med);box-shadow:0 0 0 3px rgba(43,108,176,0.1);}
.fi input.ro{background:#EDF2F7;color:var(--gris);cursor:not-allowed;font-style:italic;font-size:0.8rem;}
.fi textarea{resize:vertical;min-height:52px;}
#ab{padding:14px 20px 22px;display:none;gap:9px;flex-direction:column;}
#ab.v{display:flex;}
#bg{width:100%;padding:14px;background:linear-gradient(135deg,#1a365d,#2B6CB0);color:white;border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(26,54,93,0.3);}
#bg:hover{transform:translateY(-1px);}
#bg:disabled{background:#A0AEC0;cursor:not-allowed;box-shadow:none;transform:none;}
.br{width:100%;padding:10px;background:transparent;color:var(--gris);border:1.5px solid var(--borde);border-radius:9px;font-family:'Barlow',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all .2s;}
.br:hover{border-color:var(--med);color:var(--med);}
#sm{display:none;text-align:center;padding:28px 20px;background:#F0FFF4;border-top:3px solid #48BB78;}
#sm .ck{font-size:2.8rem;margin-bottom:6px;animation:pop .4s ease;}
@keyframes pop{0%{transform:scale(0.4);opacity:0;}70%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}
#sm h3{font-family:'Barlow Condensed',sans-serif;font-size:1.25rem;font-weight:800;color:var(--verde);text-transform:uppercase;}
#sm .sn{font-size:1rem;font-weight:700;color:var(--azul);margin-top:6px;}
#sm p{color:var(--gris);font-size:0.83rem;margin-top:4px;}
.cb{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.8rem;color:white;margin-left:4px;}
.cTC{background:#553C9A;}.cU12{background:#2B6CB0;}.cU14{background:#276749;}.cU16{background:#C05621;}.cU18{background:#9B2335;}
@keyframes spin{to{transform:rotate(360deg);}}
.sp{display:inline-block;width:13px;height:13px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:3px;}
</style>
</head>
<body>
<div class="hdr">
  <span class="ico">🏐</span>
  <h1>Selección Comunal<br>Voleibol Linares</h1>
  <p>Busca tu ficha por RUT — actualiza o crea tus datos</p>
</div>
<div class="card">
  <div class="srch">
    <label>🔍 Ingresa el RUT del deportista</label>
    <div class="srow">
      <input type="text" id="ri" placeholder="Ej: 22272126-1" maxlength="12" autocomplete="off" autocorrect="off" spellcheck="false" inputmode="text">
      <button id="bb" onclick="buscar()">Buscar</button>
    </div>
    <div class="hint">Sin puntos — Ej: 22272126-1</div>
  </div>
  <div id="sb"></div>
  <div id="pw"><div class="pl"><span>Completitud de la ficha</span><span id="pt">0%</span></div><div class="pb"><div id="pf" style="width:0%"></div></div></div>
  <div id="fb">
    <div class="sec">👤 Datos Personales</div>
    <div class="fg">
      <div class="fi"><label>Nombres <span class="r">*</span></label><input type="text" id="fn" placeholder="JUAN PABLO" autocapitalize="characters"></div>
      <div class="fi"><label>Apellidos <span class="r">*</span></label><input type="text" id="fa" placeholder="PÉREZ LÓPEZ" autocapitalize="characters"></div>
    </div>
    <div class="fg g3" style="margin-top:9px">
      <div class="fi"><label>RUT</label><input type="text" id="fr" readonly class="ro"></div>
      <div class="fi"><label>Fecha Nacimiento <span class="r">*</span></label><input type="text" id="ff" placeholder="DD-MM-AAAA" inputmode="numeric"></div>
      <div class="fi"><label>Sexo <span class="r">*</span></label>
        <select id="fs"><option value="">— Sel. —</option><option value="M">Masculino</option><option value="F">Femenino</option></select>
      </div>
    </div>
    <div class="fg" style="margin-top:9px">
      <div class="fi"><label>Categoría (automática)</label><input type="text" id="fc" readonly class="ro" placeholder="Calculada por Airtable"></div>
      <div class="fi"><label>Nacionalidad</label><input type="text" id="fna" placeholder="Chilena" autocapitalize="words"></div>
    </div>
    <div class="sec">🏫 Establecimiento</div>
    <div class="fg g1">
      <div class="fi"><label>Establecimiento Educacional <span class="r">*</span></label><input type="text" id="fe" placeholder="Colegio Instituto Linares" autocapitalize="words"></div>
    </div>
    <div class="sec">📱 Contactos</div>
    <div class="fg">
      <div class="fi"><label>Nombre Apoderado</label><input type="text" id="fap" placeholder="María González" autocapitalize="words"></div>
      <div class="fi"><label>Celular Jugador</label><input type="tel" id="fcel" placeholder="912345678" inputmode="tel"></div>
    </div>
    <div class="fg" style="margin-top:9px">
      <div class="fi"><label>Celular Apoderado (Emergencia)</label><input type="tel" id="fca" placeholder="987654321" inputmode="tel"></div>
      <div class="fi"><label>WSP normalizado</label><input type="text" id="fwsp" readonly class="ro" placeholder="+569..."></div>
    </div>
    <div class="sec">🏥 Antecedentes de Salud</div>
    <div class="fg g1">
      <div class="fi"><label>Enfermedades / Antecedentes Quirúrgicos</label><textarea id="fenf" placeholder="Dejar en blanco si no aplica..."></textarea></div>
      <div class="fi"><label>Tratamiento Farmacológico</label><textarea id="ffar" placeholder="Dejar en blanco si no aplica..."></textarea></div>
      <div class="fi"><label>Traumatismos / Lesiones</label><textarea id="fles" placeholder="Dejar en blanco si no aplica..."></textarea></div>
      <div class="fi"><label>Alergias</label><textarea id="fale" placeholder="Dejar en blanco si no aplica..."></textarea></div>
    </div>
  </div>
  <div id="ab">
    <button id="bg" onclick="guardar()">💾 Guardar Ficha</button>
    <button class="br" onclick="rst()">↩ Buscar otro deportista</button>
  </div>
  <div id="sm">
    <div class="ck">✅</div>
    <h3 id="st">¡Guardado!</h3>
    <div class="sn" id="sn"></div>
    <p id="sd"></p>
    <button class="br" style="margin-top:14px;max-width:260px;display:inline-block" onclick="rst()">↩ Buscar otro deportista</button>
  </div>
</div>
<script>
// Configuración — usar proxy CORS público para conectar con Airtable
const PROXY = 'https://corsproxy.io/?';
const AT    = 'https://api.airtable.com/v0/';
const TK    = 'patsOawn1JoDSFBQD.2d28b5a8e640fc0aa831d42c335043452526756a60d0aee2f20564ea4b9f8af1';
const BASE  = 'appCfK4VOlIbFu14K';
const TBL   = 'tbl999aWPRz18BJWL';

const F={
  nombres:'fldnkQCbM2aBMq6gg',apellidos:'fldDYRgmSrHI2MUHH',
  rut:'fldle105I52050Cpn',fnac:'fldawlh7mKeeCLesM',
  sexo:'fldxK5ISHQnGZ7vsg',colegio:'fldAIke81uMkjE3rm',
  nac:'fldMin6cf0X0lh3J7',apo:'fldZGfrqItL0jJlST',
  cel:'fldK1MMqEd5WvAApB',cel_apo:'fldUqraueOrdDN0py',
  wsp_cel:'flduxJ8kf0Z3dyheQ',wsp_apo:'fld5VYlnYj6Nl6z9m',
  enf:'fldX4V3CHhZya6ZFw',far:'fldWn27N2SkYtMQ48',
  les:'fldkTUjuKsaoDibxk',ale:'fldiKYhv9CNSKtwWZ',
  cat:'fldsOw7QsGSCmBqpM'
};

let RID=null,NUEVO=false;

function nRut(r){return r.replace(/\s/g,'').replace(/\./g,'').toUpperCase();}
function nTel(t){
  if(!t)return'';
  let s=String(t).replace(/[\s\-\.\(\)]/g,'');
  if(s.startsWith('+56'))return s;
  if(s.startsWith('569'))return'+'+s;
  if(s.startsWith('56')&&s.length>=11)return'+'+s;
  if(s.startsWith('9')&&s.length===9)return'+56'+s;
  if(s.length===8)return'+569'+s;
  return t;
}
function g(id){return document.getElementById(id);}
function val(id){return(g(id).value||'').trim();}
function set(id,v){g(id).value=(v||'').toString().trim();}

function atFetch(path,opts={}){
  const url=PROXY+encodeURIComponent(AT+path);
  const headers={'Authorization':'Bearer '+TK,'Content-Type':'application/json',...(opts.headers||{})};
  return fetch(url,{...opts,headers});
}

function setStatus(msg,tipo){
  const b=g('sb');b.style.display='flex';
  b.className=tipo;b.id='sb';b.innerHTML=msg;
}
function prog(){
  const ids=['fn','fa','ff','fs','fe','fap','fcel','fca'];
  const n=ids.filter(id=>val(id)!=='').length;
  const p=Math.round(n/ids.length*100);
  g('pf').style.width=p+'%';g('pt').textContent=p+'%';
}
function showForm(){
  g('fb').classList.add('v');g('ab').classList.add('v');g('pw').classList.add('v');
  g('sm').style.display='none';prog();
}
function llenar(rec){
  const f=rec.fields;
  set('fn',f[F.nombres]);set('fa',f[F.apellidos]);
  set('fr',f[F.rut]);set('ff',f[F.fnac]);
  const sx=(f[F.sexo]||'').toString().trim().toUpperCase().charAt(0);
  g('fs').value=(sx==='M'||sx==='F')?sx:'';
  set('fc',f[F.cat]);set('fe',f[F.colegio]);
  set('fap',f[F.apo]);set('fcel',f[F.cel]);
  set('fca',f[F.cel_apo]);set('fwsp',f[F.wsp_cel]);
  set('fna',f[F.nac]);set('fenf',f[F.enf]);
  set('ffar',f[F.far]);set('fles',f[F.les]);set('fale',f[F.ale]);
}
function rst(){
  RID=null;NUEVO=false;g('ri').value='';
  ['fb','ab','pw'].forEach(id=>g(id).classList.remove('v'));
  g('sm').style.display='none';g('sb').style.display='none';
  g('bg').innerHTML='💾 Guardar Ficha';
  ['fn','fa','fr','ff','fc','fe','fap','fcel','fca','fwsp','fna','fenf','ffar','fles','fale'].forEach(id=>set(id,''));
  g('fs').value='';g('pf').style.width='0%';g('pt').textContent='0%';
  g('ri').focus();window.scrollTo({top:0,behavior:'smooth'});
}

async function buscar(){
  const rut=nRut(g('ri').value.trim());
  if(!rut){setStatus('⚠️ Ingresa un RUT primero','err');return;}
  g('bb').disabled=true;g('bb').innerHTML='<span class="sp"></span>';
  setStatus('<span class="sp"></span> Buscando...','load');
  ['fb','ab','pw'].forEach(id=>g(id).classList.remove('v'));
  g('sm').style.display='none';
  try{
    const formula=`FIND("${rut}",UPPER(SUBSTITUTE({RUT (ej: 12.345.678-9)},".","")))>0`;
    const path=`${BASE}/${TBL}?filterByFormula=${encodeURIComponent(formula)}&maxRecords=3`;
    const res=await atFetch(path);
    const data=await res.json();
    g('bb').disabled=false;g('bb').textContent='Buscar';
    if(data.records&&data.records.length>0){
      const rec=data.records[0];RID=rec.id;NUEVO=false;
      const nom=(rec.fields[F.nombres]||'').toString().trim();
      const ape=(rec.fields[F.apellidos]||'').toString().trim();
      const cat=(rec.fields[F.cat]||'').toString().trim();
      const badge=cat?`<span class="cb c${cat}">${cat}</span>`:'';
      setStatus(`✅ Encontrado: <strong>${ape} ${nom}</strong>${badge}`,'ok');
      llenar(rec);set('fr',rut);
      g('bg').innerHTML='💾 Actualizar Ficha';showForm();
    }else{
      RID=null;NUEVO=true;
      setStatus('➕ RUT no encontrado — completa el formulario para crear ficha nueva','new');
      ['fn','fa','ff','fc','fe','fap','fcel','fca','fwsp','fna','fenf','ffar','fles','fale'].forEach(id=>set(id,''));
      g('fs').value='';set('fr',rut);
      g('bg').innerHTML='➕ Crear Ficha Nueva';showForm();
      setTimeout(()=>g('fn').focus(),200);
    }
  }catch(e){
    g('bb').disabled=false;g('bb').textContent='Buscar';
    setStatus('❌ Error de conexión. Verifica tu internet.','err');console.error(e);
  }
}

async function guardar(){
  const nombres=val('fn'),apellidos=val('fa'),rut=val('fr');
  if(!nombres||!apellidos){setStatus('⚠️ Nombres y apellidos son obligatorios','err');return;}
  const btn=g('bg');btn.disabled=true;btn.innerHTML='<span class="sp"></span> Guardando...';
  const cel=val('fcel'),cela=val('fca');
  const fields={
    [F.nombres]:nombres.toUpperCase(),[F.apellidos]:apellidos.toUpperCase(),
    [F.rut]:rut,[F.fnac]:val('ff'),[F.sexo]:g('fs').value,
    [F.colegio]:val('fe'),[F.apo]:val('fap'),
    [F.cel]:cel,[F.cel_apo]:cela,
    [F.wsp_cel]:nTel(cel),[F.wsp_apo]:nTel(cela),
    [F.nac]:val('fna'),[F.enf]:val('fenf'),
    [F.far]:val('ffar'),[F.les]:val('fles'),[F.ale]:val('fale')
  };
  try{
    const path=NUEVO?`${BASE}/${TBL}`:`${BASE}/${TBL}/${RID}`;
    const method=NUEVO?'POST':'PATCH';
    const res=await atFetch(path,{method,body:JSON.stringify({fields})});
    const data=await res.json();
    btn.disabled=false;btn.innerHTML=NUEVO?'➕ Crear Ficha Nueva':'💾 Actualizar Ficha';
    if(data.id){
      ['fb','ab','pw'].forEach(id=>g(id).classList.remove('v'));
      g('sb').style.display='none';g('sm').style.display='block';
      g('st').textContent=NUEVO?'¡Ficha creada!':'¡Ficha actualizada!';
      g('sn').textContent=`${apellidos.toUpperCase()} ${nombres.toUpperCase()}`;
      g('sd').textContent=`RUT: ${rut} · ${NUEVO?'Nuevo registro creado':'Datos actualizados'} en Airtable`;
      g('sm').scrollIntoView({behavior:'smooth',block:'center'});
    }else{
      setStatus('❌ Error: '+(data.error?.message||'Verifica los datos'),'err');
      console.error(data);
    }
  }catch(e){
    btn.disabled=false;btn.innerHTML=NUEVO?'➕ Crear Ficha Nueva':'💾 Actualizar Ficha';
    setStatus('❌ Error de conexión al guardar','err');console.error(e);
  }
}

g('ri').addEventListener('keydown',e=>{if(e.key==='Enter')buscar();});
g('ri').addEventListener('input',function(){this.value=this.value.replace(/[^0-9kK\-]/g,'');});
g('fcel').addEventListener('input',function(){set('fwsp',nTel(this.value.trim()));prog();});
['fn','fa','ff','fs','fe','fap','fca'].forEach(id=>{
  g(id).addEventListener('input',prog);g(id).addEventListener('change',prog);
});
</script>
</body>
</html>
